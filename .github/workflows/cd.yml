name: CD - Build and Deploy

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build JAR
        run: ./gradlew clean build -x test --no-daemon

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: mushroom-server:${{ github.sha }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          retention-days: 7

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Docker image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: docker load --input /tmp/image.tar

      - name: Deploy to server
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          UPLOAD_BASE_URL: ${{ secrets.UPLOAD_BASE_URL || 'http://localhost:8080' }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p $DEPLOY_PORT $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          # 传输镜像到远程服务器
          scp -i ~/.ssh/deploy_key -P $DEPLOY_PORT /tmp/image.tar $DEPLOY_USER@$DEPLOY_HOST:/tmp/

          # 在远程服务器上执行部署
          ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
          set -e
          echo "🍄 Deploying mushroom-server..."

          # 加载镜像
          docker load --input /tmp/image.tar
          IMAGE_ID=$(docker images --format "{{.ID}}" mushroom-server | head -1)
          docker tag $IMAGE_ID mushroom-server:latest

          # 更新 .env 文件
          cat > /root/workspace/mushroom-server/.env << 'ENVEOF'
          POSTGRES_URL=jdbc:postgresql://mushroom-postgres:5432/mushroom
          POSTGRES_USER=mushroom
          POSTGRES_PASSWORD=$DB_PASSWORD
          JWT_SECRET=$JWT_SECRET
          UPLOAD_BASE_URL=$UPLOAD_BASE_URL
          ENVEOF

          cd /root/workspace/mushroom-server

          # 停止旧容器
          docker-compose -f docker-compose.yml down || true

          # 启动新容器
          docker-compose -f docker-compose.yml up -d

          # 等待服务就绪
          echo "Waiting for services to be ready..."
          sleep 5

          # 检查 PostgreSQL
          for i in {1..30}; do
            if docker exec mushroom-postgres pg_isready -U mushroom > /dev/null 2>&1; then
              echo "✅ PostgreSQL is ready"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ PostgreSQL failed to start"
              docker logs mushroom-postgres | tail -20
              exit 1
            fi
            sleep 1
          done

          # 检查应用健康状态
          for i in {1..30}; do
            if docker inspect mushroom-server --format='{{.State.Health.Status}}' 2>/dev/null | grep -q healthy; then
              echo "✅ Application is healthy"
              exit 0
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Application failed to become healthy"
              docker logs mushroom-server | tail -50
              exit 1
            fi
            echo "Attempt $i/30: Waiting for application..."
            sleep 2
          done
          EOF

      - name: Verify deployment
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
          echo "Verifying deployment..."
          curl -f http://localhost:8080/health || exit 1
          echo "✅ Deployment verified successfully!"
          EOF

      - name: Notify deployment
        if: always()
        run: |
          echo "Deployment status: ${{ job.status }}"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"
