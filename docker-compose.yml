version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mushroom-postgres
    environment:
      POSTGRES_DB: mushroom
      POSTGRES_USER: mushroom
      POSTGRES_PASSWORD: mushroom_password_123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mushroom"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mushroom-network

  mushroom-server:
    image: mushroom-server:latest
    container_name: mushroom-server
    depends_on:
      - postgres
    env_file: .env
    ports:
      - "8080:8080"
    networks:
      - mushroom-network
    restart: on-failure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  postgres_data:

networks:
  mushroom-network:
    driver: bridge
