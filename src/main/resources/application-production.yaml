ktor:
    application:
        modules:
            - com.mushroom.ApplicationKt.module
    deployment:
        port: 8080

postgres:
    url: ${POSTGRES_URL}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

jwt:
    secret: ${JWT_SECRET}
    issuer: "mushroom-server"
    audience: "mushroom-client"
    realm: "mushroom"
    accessTokenExpireMinutes: 120
    refreshTokenExpireDays: 30

upload:
    dir: "uploads/avatars"
    maxSizeBytes: 2097152
    baseUrl: ${UPLOAD_BASE_URL}
